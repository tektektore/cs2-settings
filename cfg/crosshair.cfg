// cs2 kitchen crosshair config 2025.v1
//hope you find it useful
exec "crosshair_aliases_1"
exec "crosshair_aliases_2"
exec crosshair_aliases_3
exec crosshair_aliases_4
exec crosshair_aliases_5
exec crosshair_aliases_6
exec crosshair_aliases_7
exec crosshair_aliases_8
exec crosshair_aliases_9
exec crosshair_aliases_10
exec crosshair_aliases_11
exec crosshair_aliases_12
exec crosshair_aliases_13
exec crosshair_aliases_14

//crosshair size toggle up arrow key
alias crosshair_size_0_5 "cl_crosshairsize 0.5; alias toggle_crosshair_size crosshair_size_0_75"
alias crosshair_size_0_75 "cl_crosshairsize 0.75; alias toggle_crosshair_size crosshair_size_1"
alias crosshair_size_1 "cl_crosshairsize 1; alias toggle_crosshair_size crosshair_size_1_25"
alias crosshair_size_1_25 "cl_crosshairsize 1.25; alias toggle_crosshair_size crosshair_size_1_5"
alias crosshair_size_1_5 "cl_crosshairsize 1.5; alias toggle_crosshair_size crosshair_size_1_75"
alias crosshair_size_1_75 "cl_crosshairsize 1.75; alias toggle_crosshair_size crosshair_size_2"
alias crosshair_size_2 "cl_crosshairsize 2; alias toggle_crosshair_size crosshair_size_2_25"
alias crosshair_size_2_25 "cl_crosshairsize 2.25; alias toggle_crosshair_size crosshair_size_2_5"
alias crosshair_size_2_5 "cl_crosshairsize 2.5; alias toggle_crosshair_size crosshair_size_2_75"
alias crosshair_size_2_75 "cl_crosshairsize 2.75; alias toggle_crosshair_size crosshair_size_3"
alias crosshair_size_3 "cl_crosshairsize 3; alias toggle_crosshair_size crosshair_size_0_5"
alias toggle_crosshair_size crosshair_size_0_5
bind "UPARROW" "toggle_crosshair_size"

//crosshair gap toggle down arrow key
alias crosshair_gap_minus_5 "cl_crosshairgap -5; alias toggle_crosshair_gap crosshair_gap_minus_4_5"
alias crosshair_gap_minus_4_5 "cl_crosshairgap -4.5; alias toggle_crosshair_gap crosshair_gap_minus_4"
alias crosshair_gap_minus_4 "cl_crosshairgap -4; alias toggle_crosshair_gap crosshair_gap_minus_3_5"
alias crosshair_gap_minus_3_5 "cl_crosshairgap -3.5; alias toggle_crosshair_gap crosshair_gap_minus_3"
alias crosshair_gap_minus_3 "cl_crosshairgap -3; alias toggle_crosshair_gap crosshair_gap_minus_2_5"
alias crosshair_gap_minus_2_5 "cl_crosshairgap -2.5; alias toggle_crosshair_gap crosshair_gap_minus_2"
alias crosshair_gap_minus_2 "cl_crosshairgap -2; alias toggle_crosshair_gap crosshair_gap_minus_1_5"
alias crosshair_gap_minus_1_5 "cl_crosshairgap -1.5; alias toggle_crosshair_gap crosshair_gap_minus_1"
alias crosshair_gap_minus_1 "cl_crosshairgap -1; alias toggle_crosshair_gap crosshair_gap_minus_0_5"
alias crosshair_gap_minus_0_5 "cl_crosshairgap -0.5; alias toggle_crosshair_gap crosshair_gap_0"
alias crosshair_gap_0 "cl_crosshairgap 0; alias toggle_crosshair_gap crosshair_gap_minus_5"
alias toggle_crosshair_gap crosshair_gap_minus_5
bind "DOWNARROW" "toggle_crosshair_gap"

//crosshair color bound to leftarrow
alias crosshair_color_white "cl_crosshaircolor 5; cl_crosshaircolor_r 255; cl_crosshaircolor_g 255; cl_crosshaircolor_b 255; alias toggle_crosshair_color crosshair_color_yellow"
alias crosshair_color_yellow "cl_crosshaircolor 5; cl_crosshaircolor_r 255; cl_crosshaircolor_g 255; cl_crosshaircolor_b 0; alias toggle_crosshair_color crosshair_color_green"
alias crosshair_color_green "cl_crosshaircolor 5; cl_crosshaircolor_r 0; cl_crosshaircolor_g 255; cl_crosshaircolor_b 0; alias toggle_crosshair_color crosshair_color_red"
alias crosshair_color_red "cl_crosshaircolor 5; cl_crosshaircolor_r 255; cl_crosshaircolor_g 0; cl_crosshaircolor_b 0; alias toggle_crosshair_color crosshair_color_cyan"
alias crosshair_color_cyan "cl_crosshaircolor 5; cl_crosshaircolor_r 0; cl_crosshaircolor_g 255; cl_crosshaircolor_b 255; alias toggle_crosshair_color crosshair_color_white"
alias toggle_crosshair_color crosshair_color_white
bind "LEFTARROW" "toggle_crosshair_color"

//crosshairthickness bound to right arrow
alias crosshair_thickness_0 "cl_crosshairthickness 0; alias toggle_crosshair_thickness crosshair_thickness_0_2"
alias crosshair_thickness_0_2 "cl_crosshairthickness 0.2; alias toggle_crosshair_thickness crosshair_thickness_0_4"
alias crosshair_thickness_0_4 "cl_crosshairthickness 0.4; alias toggle_crosshair_thickness crosshair_thickness_0_6"
alias crosshair_thickness_0_6 "cl_crosshairthickness 0.6; alias toggle_crosshair_thickness crosshair_thickness_0_8"
alias crosshair_thickness_0_8 "cl_crosshairthickness 0.8; alias toggle_crosshair_thickness crosshair_thickness_1"
alias crosshair_thickness_1 "cl_crosshairthickness 1; alias toggle_crosshair_thickness crosshair_thickness_1_2"
alias crosshair_thickness_1_2 "cl_crosshairthickness 1.2; alias toggle_crosshair_thickness crosshair_thickness_1_4"
alias crosshair_thickness_1_4 "cl_crosshairthickness 1.4; alias toggle_crosshair_thickness crosshair_thickness_1_6"
alias crosshair_thickness_1_6 "cl_crosshairthickness 1.6; alias toggle_crosshair_thickness crosshair_thickness_1_8"
alias crosshair_thickness_1_8 "cl_crosshairthickness 1.8; alias toggle_crosshair_thickness crosshair_thickness_0"
alias toggle_crosshair_thickness crosshair_thickness_0
bind "RIGHTARROW" "toggle_crosshair_thickness"

/// Custom dot crosshair for `.`
bind . "cl_crosshairalpha 200;cl_crosshaircolor 1;cl_crosshaircolor_b 50;cl_crosshaircolor_r 50;cl_crosshaircolor_g 250;cl_crosshairdot 1;cl_crosshairgap -3.1;cl_crosshairsize 0.5;cl_crosshairstyle 4;cl_crosshairusealpha 1;cl_crosshairthickness 0.8;cl_fixedcrosshairgap -5;cl_crosshair_outlinethickness 1;cl_crosshair_drawoutline 1"

// Toggle outline for `,`
alias toggle_outline_on "cl_crosshair_drawoutline 1; alias toggle_outline toggle_outline_off"
alias toggle_outline_off "cl_crosshair_drawoutline 0; alias toggle_outline toggle_outline_on"
alias toggle_outline toggle_outline_off
//bind , "toggle_outline"

// Pro crosshair aliases
alias crosshairswitch crosshair_donk

alias crosshair_donk "cl_crosshairstyle 4; cl_crosshairsize 1; cl_crosshairthickness 1; cl_crosshairgap -4; cl_crosshair_drawoutline 0; cl_crosshairdot 0; cl_crosshaircolor 5; cl_crosshaircolor_r 255; cl_crosshaircolor_g 255; cl_crosshaircolor_b 255; cl_crosshairalpha 255; cl_crosshairusealpha 1; cl_crosshair_t 0; alias crosshairswitch crosshair_jl"
alias crosshair_jl "cl_crosshairstyle 4; cl_crosshairsize 1; cl_crosshairthickness 0.5; cl_crosshairgap -3; cl_crosshair_drawoutline 0; cl_crosshairdot 1; cl_crosshaircolor 4; cl_crosshaircolor_r 0; cl_crosshaircolor_g 255; cl_crosshaircolor_b 255; cl_crosshairalpha 255; cl_crosshairusealpha 1; cl_crosshair_t 0; alias crosshairswitch crosshair_im"
alias crosshair_im "cl_crosshairstyle 4; cl_crosshairsize 1.5; cl_crosshairthickness 0.5; cl_crosshairgap -3; cl_crosshair_drawoutline 1; cl_crosshairdot 0; cl_crosshaircolor 2; cl_crosshaircolor_r 255; cl_crosshaircolor_g 255; cl_crosshaircolor_b 0; cl_crosshairalpha 255; cl_crosshairusealpha 1; cl_crosshair_t 0; alias crosshairswitch crosshair_rain"
alias crosshair_rain "cl_crosshairstyle 4; cl_crosshairsize 1.5; cl_crosshairthickness 1; cl_crosshairgap -3; cl_crosshair_drawoutline 0; cl_crosshairdot 0; cl_crosshaircolor 1; cl_crosshaircolor_r 0; cl_crosshaircolor_g 255; cl_crosshaircolor_b 0; cl_crosshairalpha 255; cl_crosshairusealpha 1; cl_crosshair_t 0; alias crosshairswitch crosshair_ropz"
alias crosshair_ropz "cl_crosshairstyle 4; cl_crosshairsize 2; cl_crosshairthickness 0.5; cl_crosshairgap -3; cl_crosshair_drawoutline 0; cl_crosshairdot 0; cl_crosshaircolor 1; cl_crosshaircolor_r 0; cl_crosshaircolor_g 255; cl_crosshaircolor_b 0; cl_crosshairalpha 255; cl_crosshairusealpha 1; cl_crosshair_t 0; alias crosshairswitch crosshair_zywoo"
alias crosshair_zywoo "cl_crosshairstyle 4; cl_crosshairsize 2; cl_crosshairthickness 0.5; cl_crosshairgap -3; cl_crosshair_drawoutline 0; cl_crosshairdot 0; cl_crosshaircolor 4; cl_crosshaircolor_r 0; cl_crosshaircolor_g 255; cl_crosshaircolor_b 255; cl_crosshairalpha 255; cl_crosshairusealpha 1; cl_crosshair_t 0; alias crosshairswitch crosshair_niko"
alias crosshair_niko "cl_crosshairstyle 4; cl_crosshairsize 1; cl_crosshairthickness 0.5; cl_crosshairgap -4; cl_crosshair_drawoutline 0; cl_crosshairdot 0; cl_crosshaircolor 5; cl_crosshaircolor_r 255; cl_crosshaircolor_g 255; cl_crosshaircolor_b 255; cl_crosshairalpha 255; cl_crosshairusealpha 1; cl_crosshair_t 0; alias crosshairswitch crosshair_m0nesy"
alias crosshair_m0nesy "cl_crosshairstyle 4; cl_crosshairsize 1.5; cl_crosshairthickness 0.5; cl_crosshairgap -3; cl_crosshair_drawoutline 0; cl_crosshairdot 1; cl_crosshaircolor 1; cl_crosshaircolor_r 0; cl_crosshaircolor_g 255; cl_crosshaircolor_b 0; cl_crosshairalpha 255; cl_crosshairusealpha 1; cl_crosshair_t 0; alias crosshairswitch crosshair_donk"

// Bind Page Up key to cycle through pro crosshairs
bind "PGUP" "crosshairswitch"
showconsole;

echo "CS2 crosshair config loaded successfully:)\n"









