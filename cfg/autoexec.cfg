bind "mwheeldown" 	"+jump";
bind "mwheelup" 	"+jump";
bind space "+jump"

exec defaultWASD;
exec nullWASD;
sv_subtick_movement_view_angles 0;sv_jump_spam_penalty_time 0


//Binds
bind "r" "+reload"
bind "end" 	"toggleconsole"
bind "mouse5" 	"+voicerecord"
bind "k" "say_team Need Weapon"
bind "q" "+doubleq"
bind "," "noclip"
bind "l" "say .rethrow"
bind "semicolon" "say .clear"
bind "mouse4" "player_ping"
bind "c"		"slot10"
bind "f"		"slot7"
bind "v"		"slot8"
bind "mouse3" "+lookatweapon"
bind "i" "say_team nt"
bind "o" "say_team gj"
bind "p" "say GET LEETIFY"
bind e "+use"
bind z "radio"
bind 1 "slot1;viewmodel_offset_y 0;viewmodel_offset_z -2"
bind 2 "slot2;viewmodel_offset_y 0;viewmodel_offset_z -2"
bind 3 "slot3;viewmodel_offset_y 2;viewmodel_offset_z -1.5"
bind 4 "slot4"
bind 5 "slot5"


alias skinserver "connect vertigo.epidemic.gg"


//Alias
alias +doubleq "slot3";alias -doubleq "lastinv"



//Settings
volume 0.08;sensitivity 1.2;cl_showloadout "1"

//FPS
fps_max "0"

//NetSettings
rate 9999999;cl_interp_ratio 1;cl_interp 0

//Sound
snd_mixahead "0.05"


