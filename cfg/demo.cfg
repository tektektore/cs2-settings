bind w +forward
bind s +back
bind a +left
bind d +right

bind "0" "spec_player 0"
bind "1" "spec_player 1"
bind "2" "spec_player 2"
bind "3" "spec_player 3"
bind "4" "spec_player 4"
bind "5" "spec_player 5"
bind "6" "spec_player 6"
bind "7" "spec_player 7"
bind "8" "spec_player 8"
bind "9" "spec_player 9"

bind "r" "toggle spec_show_xray" 

bind "q" "demoui"
bind "space" "demo_togglepause"

alias +fast "demo_timescale 5"
alias -fast "demo_timescale 1"

alias +slow "demo_timescale 0.25" 
alias -slow "demo_timescale 1" 

bind "mouse5" "+fast"
bind "mouse4" "+slow"

bind "e" "+jump"

//1500ticks backwards
bind "z" "demo_gototick -900 relative"
//500ticks backwards
bind "x" "demo_gototick -300 relative"
//500ticks forwards
bind "c" "demo_gototick +300 relative"
//1500ticks forwards
bind "v" "demo_gototick +900 relative"


sv_grenade_trajectory_prac_pipreview 1
